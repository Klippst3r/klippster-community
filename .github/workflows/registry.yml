name: Validate registry

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Validates every pack manifest and that registry.json matches the packs tree.
      - name: Check registry.json is current and packs are valid
        run: python3 scripts/build_registry.py --check

      # Verify the registry signature (issue #16) on EVERY push and pull request. A pack PR that
      # changes registry.json makes this fail until the maintainer re-signs offline on the branch —
      # that's the intended gate: a stale-signature index can never be merged to main. (Non-pack PRs
      # don't touch registry.json, so its existing signature still verifies and this passes.)
      # ubuntu-latest ships OpenSSL 3, which supports Ed25519 `pkeyutl -rawin`.
      - name: Verify registry signature
        run: |
          openssl version
          openssl pkeyutl -verify -pubin -inkey keys/registry_signing_pub.pem -rawin \
            -in registry.json -sigfile registry.json.sig

      # Belt-and-suspenders: validate the index and each manifest against their JSON Schemas.
      - name: JSON Schema validation
        run: |
          python3 -m pip install --quiet jsonschema
          python3 - <<'PY'
          import json, glob, sys
          from jsonschema import validate, ValidationError

          def load(path):
              with open(path, encoding="utf-8") as f:
                  return json.load(f)

          errors = []
          registry_schema = load("schema/registry.schema.json")
          pack_schema = load("schema/klippster-pack.schema.json")

          try:
              validate(load("registry.json"), registry_schema)
          except ValidationError as e:
              errors.append(f"registry.json: {e.message}")

          for manifest in glob.glob("packs/*/klippster.json"):
              try:
                  validate(load(manifest), pack_schema)
              except ValidationError as e:
                  errors.append(f"{manifest}: {e.message}")

          for err in errors:
              print(f"error: {err}", file=sys.stderr)
          sys.exit(1 if errors else 0)
          PY
